name: Check upstream updates

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/RoseKhlifa/Image-Studio.git

      - name: Check upstream status
        id: upstream
        run: |
          node scripts/check-upstream-updates.mjs > upstream-status.json
          cat upstream-status.json
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('upstream-status.json','utf8')); for (const [key,value] of Object.entries(data)) fs.appendFileSync(process.env.GITHUB_OUTPUT, `${key}=${String(value).replace(/\n/g, ' ')}\n`);"

      - name: Create or update reminder issue
        if: steps.upstream.outputs.hasUpdates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const label = "upstream-sync";
            const title = "Upstream Image-Studio has new commits";
            const body = [
              "The upstream repository has commits that are not mirrored in `upstream-main`.",
              "",
              `- Upstream: \`${{ steps.upstream.outputs.upstreamRef }}\` @ \`${{ steps.upstream.outputs.upstreamHead }}\``,
              `- Mirror: \`${{ steps.upstream.outputs.mirrorRef }}\` @ \`${{ steps.upstream.outputs.mirrorHead }}\``,
              `- New upstream commits: \`${{ steps.upstream.outputs.behindCount }}\``,
              `- Latest upstream subject: ${{ steps.upstream.outputs.upstreamSubject }}`,
              "",
              "Suggested sync flow:",
              "",
              "```bash",
              "git fetch upstream",
              "git checkout upstream-main",
              "git merge --ff-only upstream/main",
              "git push origin upstream-main",
              "",
              "git checkout main",
              "git merge upstream-main",
              "npm --prefix server test",
              "git push origin main",
              "```"
            ].join("\n");

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: "0969da",
                description: "Tracks updates from the upstream Image-Studio repository",
              });
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
            });
            const existing = issues.find((issue) => issue.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }

      - name: No upstream changes
        if: steps.upstream.outputs.hasUpdates != 'true'
        run: echo "upstream-main is current."
